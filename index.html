<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Progetti DIY — Claude Projects</title>
<meta name="theme-color" content="#0e1117">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e1117;--sf:#161b22;--sf2:#1c2230;--bd:#2a3040;--tx:#e6edf3;--tx2:#8b949e;--ac:#58a6ff;--ac2:#3fb950;--wn:#f0883e;--rd:#f85149;--pd:#d2a8ff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;min-height:100vh}

.c{max-width:720px;margin:0 auto;padding:2rem 1.5rem}

header{text-align:center;padding:3rem 0 2rem;border-bottom:1px solid var(--bd);margin-bottom:2.5rem}
header h1{font-family:'Space Mono',monospace;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;letter-spacing:-1.5px;margin-bottom:.5rem;background:linear-gradient(135deg,var(--ac),var(--pd));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--tx2);font-size:.9rem;max-width:420px;margin:0 auto}
.count{display:inline-block;font-family:'Space Mono',monospace;font-size:.65rem;padding:.25rem .65rem;border-radius:999px;border:1px solid var(--bd);color:var(--tx2);background:var(--sf);margin-top:.8rem}

.grid{display:flex;flex-direction:column;gap:.7rem}

.card{display:block;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:1.2rem 1.4rem;text-decoration:none;color:inherit;transition:border-color .2s,transform .15s,box-shadow .2s;-webkit-tap-highlight-color:transparent}
.card:hover,.card:active{border-color:var(--ac);transform:translateY(-2px);box-shadow:0 4px 24px rgba(88,166,255,.08)}

.card-top{display:flex;align-items:center;justify-content:space-between;gap:.8rem;margin-bottom:.35rem}
.card-name{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;color:var(--ac);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-arrow{color:var(--tx2);flex-shrink:0;transition:transform .2s,color .2s}
.card:hover .card-arrow{transform:translateX(3px);color:var(--ac)}

.card-desc{font-size:.85rem;color:var(--tx2);line-height:1.5}

.card-footer{display:flex;gap:.6rem;align-items:center;margin-top:.6rem;flex-wrap:wrap}
.badge{font-family:'Space Mono',monospace;font-size:.6rem;padding:.2rem .5rem;border-radius:999px;border:1px solid var(--bd);color:var(--tx2);background:var(--sf2);text-transform:uppercase;letter-spacing:.5px}
.status{font-family:'Space Mono',monospace;font-size:.6rem;padding:.2rem .55rem;border-radius:999px;text-transform:uppercase;letter-spacing:.5px}
.status-completato{border:1px solid var(--ac2);color:var(--ac2);background:rgba(63,185,80,.1)}
.status-pianificato{border:1px solid var(--ac);color:var(--ac);background:rgba(88,166,255,.1)}
.status-in-corso{border:1px solid var(--wn);color:var(--wn);background:rgba(240,136,62,.1)}

/* Loading & error states */
.loader{text-align:center;padding:3rem 0;color:var(--tx2)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite;margin-bottom:.6rem}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:2rem;color:var(--rd);font-size:.85rem}
.retry{margin-top:.8rem;padding:.4rem .8rem;background:var(--sf);border:1px solid var(--bd);color:var(--tx2);border-radius:6px;font-size:.72rem;cursor:pointer;font-family:'Space Mono',monospace}
.retry:hover{border-color:var(--ac);color:var(--ac)}

footer{text-align:center;padding:1.5rem 0;border-top:1px solid var(--bd);margin-top:2.5rem;color:var(--tx2);font-size:.72rem}
footer a{color:var(--ac);text-decoration:none}

@media(max-width:600px){.c{padding:1rem}header{padding:2rem 0 1.5rem}.card{padding:1rem 1.1rem}}
</style>
</head>
<body>
<div class="c">

<header>
  <h1>Progetti DIY</h1>
  <p>Progetti di falegnameria pianificati con Claude. Ogni progetto ha dimensioni, distinta, piano taglio, lista spesa e istruzioni.</p>
  <div class="count" id="count">...</div>
</header>

<div class="grid" id="grid">
  <div class="loader"><div class="spinner"></div><br>Caricamento progetti...</div>
</div>

<footer>
  <a href="https://github.com/fabiosangregorio/claude-projects" target="_blank" rel="noopener">fabiosangregorio/claude-projects</a> — GitHub Pages
</footer>

</div>
<script>
// Project descriptions — add new projects here or they'll show a default description
const META = {
  'mobile-lavatrice': {
    desc: 'Mobile a ponte per lavatrice LG F10B8NDA',
    tags: ['truciolare', 'mobile'],
    status: 'completato'
  },
  'scaffale-erbe': {
    desc: 'Scaffale a scala per erbe aromatiche sul balcone',
    tags: ['balcone', 'scaffale'],
    status: 'pianificato'
  }
};

const REPO = 'fabiosangregorio/claude-projects';
const BASE = `https://fabiosangregorio.github.io/claude-projects`;
const API  = `https://api.github.com/repos/${REPO}/contents`;
// Folders to exclude from project listing
const EXCLUDE = new Set(['.git', '.github', 'node_modules', 'assets']);

async function load() {
  const grid = document.getElementById('grid');
  const count = document.getElementById('count');

  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
    const items = await res.json();

    // Filter: only directories that contain an index.html (i.e. real projects)
    const dirs = items.filter(i => i.type === 'dir' && !EXCLUDE.has(i.name));

    // Verify each dir has an index.html
    const projects = [];
    for (const dir of dirs) {
      try {
        const check = await fetch(`${API}/${dir.name}/index.html`);
        if (check.ok) projects.push(dir.name);
      } catch { /* skip */ }
    }

    if (projects.length === 0) {
      grid.innerHTML = '<div class="loader" style="color:var(--tx2)">Nessun progetto trovato.</div>';
      count.textContent = '0 progetti';
      return;
    }

    count.textContent = `${projects.length} progett${projects.length === 1 ? 'o' : 'i'}`;

    grid.innerHTML = projects.map(name => {
      const meta = META[name] || {};
      const desc = meta.desc || formatName(name);
      const tags = meta.tags || [];
      const status = meta.status || '';
      const statusLabels = { completato: '✅ Completato', pianificato: '📐 Pianificato', 'in-corso': '🔨 In corso' };
      const statusHtml = status ? `<span class="status status-${status}">${statusLabels[status] || status}</span>` : '';
      const tagsHtml = tags.map(t => `<span class="badge">${t}</span>`).join('');

      return `
        <a class="card" href="${BASE}/${name}/">
          <div class="card-top">
            <span class="card-name">${formatName(name)}</span>
            <svg class="card-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </div>
          <div class="card-desc">${desc}</div>
          ${(statusHtml || tagsHtml) ? `<div class="card-footer">${statusHtml}${tagsHtml}</div>` : ''}
        </a>`;
    }).join('');

  } catch (err) {
    grid.innerHTML = `
      <div class="error">
        Errore nel caricamento dei progetti.<br>
        <small>${err.message}</small><br>
        <button class="retry" onclick="load()">Riprova</button>
      </div>`;
    count.textContent = '—';
  }
}

function formatName(slug) {
  return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

load();
</script>
</body>
</html>
