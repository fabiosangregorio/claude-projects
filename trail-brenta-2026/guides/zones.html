<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBT 21K — Zone FC</title>
<meta name="theme-color" content="#0e1117">
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark')</script>
<link rel="stylesheet" href="/claude-projects/theme.css">
<script src="/claude-projects/theme.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e1117;--sf:#161b22;--sf2:#1c2230;--bd:#2a3040;--tx:#e6edf3;--tx2:#8b949e;--ac:#58a6ff;--ac2:#3fb950;--wn:#f0883e;--rd:#f85149;--pd:#d2a8ff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
.c{max-width:760px;margin:0 auto;padding:1.5rem 1rem 3rem}

.back{display:inline-flex;align-items:center;gap:.35rem;font-family:'Space Mono',monospace;font-size:.75rem;color:var(--tx2);text-decoration:none;padding:.35rem .6rem;border-radius:6px;border:1px solid var(--bd);background:var(--sf);transition:border-color .2s,color .2s;margin-bottom:1.5rem}
.back:hover{border-color:var(--ac);color:var(--ac)}
.back svg{width:14px;height:14px}

.hero{margin-bottom:2rem}
.kicker{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--ac2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.5rem}
.hero h1{font-family:'Space Mono',monospace;font-size:clamp(1.4rem,4.5vw,2rem);font-weight:700;letter-spacing:-.5px;line-height:1.25;margin-bottom:.5rem;color:var(--tx)}
.hero-sub{color:var(--tx2);font-size:.85rem}

section{margin:2rem 0}
.s-title{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--tx2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.s-title::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ac)}

.card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:1rem 1.1rem;margin-bottom:.7rem}

.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem;margin-bottom:.7rem}
.info-cell{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:.7rem .8rem}
.info-lbl{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;margin-bottom:.2rem}
.info-val{font-family:'Space Mono',monospace;font-size:1.05rem;font-weight:700;color:var(--tx)}
.info-val.acc{color:var(--ac)}
.info-val.acc2{color:var(--ac2)}

.zone-row{display:grid;grid-template-columns:auto auto 1fr;gap:.7rem;align-items:center;padding:.6rem 0;border-bottom:1px solid var(--bd);font-size:.82rem}
.zone-row:last-child{border-bottom:none}
.zone-id{font-family:'Space Mono',monospace;font-weight:700;font-size:.9rem;min-width:1.8rem}
.zone-bpm{font-family:'Space Mono',monospace;color:var(--tx2);min-width:6rem;font-size:.8rem}
.zone-lbl{color:var(--tx);font-weight:500}
.zone-use{display:block;font-size:.74rem;color:var(--tx2);margin-top:.2rem;line-height:1.45}

.note{margin-top:.9rem;padding:.7rem .85rem;background:rgba(63,185,80,.06);border:1px solid rgba(63,185,80,.28);border-radius:8px;font-size:.82rem;color:var(--tx);line-height:1.55}
.note strong{color:var(--ac2);font-family:'Space Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:.25rem}

.source{margin-top:.9rem;padding:.7rem .85rem;background:rgba(240,136,62,.05);border:1px solid rgba(240,136,62,.25);border-radius:8px;font-size:.78rem;color:var(--tx2);line-height:1.55}
.source strong{color:var(--wn);font-family:'Space Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:.25rem}

.loader{text-align:center;padding:3rem 0;color:var(--tx2)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite;margin-bottom:.6rem}
@keyframes spin{to{transform:rotate(360deg)}}
.error{padding:1.5rem;color:var(--rd);font-size:.85rem;background:rgba(248,81,73,.05);border:1px solid var(--rd);border-radius:10px;text-align:center}

footer{margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--bd);text-align:center;color:var(--tx2);font-size:.72rem}
footer a{color:var(--ac);text-decoration:none}
</style>
</head>
<body>
<div class="c">
  <a class="back" href="../"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>Home</a>

  <div id="app"><div class="loader"><div class="spinner"></div><br>Caricamento dati...</div></div>

  <footer>
    <a href="https://github.com/fabiosangregorio/claude-projects/tree/main/trail-brenta-2026" target="_blank" rel="noopener">trail-brenta-2026</a>
  </footer>
</div>

<script>
const BASE = '../data/';

async function loadAll() {
  const app = document.getElementById('app');
  try {
    const profile = await fetch(BASE + 'profile.json').then(r => {
      if (!r.ok) throw new Error('profile.json: ' + r.status);
      return r.json();
    });
    render(app, profile);
  } catch (err) {
    app.innerHTML = `<div class="error">Errore caricamento dati: ${err.message}</div>`;
  }
}

function render(app, profile) {
  const z = profile.training_zones;
  const zonesHtml = (z.zones || []).map(zone => `
    <div class="zone-row">
      <div class="zone-id" style="color:${zone.color}">${zone.id.toUpperCase()}</div>
      <div class="zone-bpm">${zone.min_bpm}–${zone.max_bpm} bpm</div>
      <div><span class="zone-lbl">${zone.label}</span><span class="zone-use">${zone.use}</span></div>
    </div>
  `).join('');

  app.innerHTML = `
    <div class="hero">
      <div class="kicker">Guida</div>
      <h1>Zone di frequenza cardiaca</h1>
      <p class="hero-sub">Le 5 zone di allenamento basate su FCmax. Il riferimento per leggere ogni sessione.</p>
    </div>

    <section>
      <h2 class="s-title">Riferimenti</h2>
      <div class="info-grid">
        <div class="info-cell"><div class="info-lbl">FCmax</div><div class="info-val acc">${z.fcmax_bpm} bpm</div></div>
        <div class="info-cell"><div class="info-lbl">MAF ceiling</div><div class="info-val acc2">${z.maf_ceiling_bpm} bpm</div></div>
      </div>
      <div class="source"><strong>Fonte FCmax</strong>${z.fcmax_source}</div>
    </section>

    <section>
      <h2 class="s-title">Le 5 zone</h2>
      <div class="card">${zonesHtml}</div>
      <div class="note"><strong>★ MAF ${z.maf_ceiling_bpm} bpm</strong>${z.maf_note}</div>
    </section>
  `;
}

loadAll();
</script>
</body>
</html>
