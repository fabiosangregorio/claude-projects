<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBT 21K — Piano di allenamento</title>
<meta name="theme-color" content="#0e1117">
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark')</script>
<link rel="stylesheet" href="/claude-projects/theme.css">
<script src="/claude-projects/theme.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e1117;--sf:#161b22;--sf2:#1c2230;--bd:#2a3040;--tx:#e6edf3;--tx2:#8b949e;--ac:#58a6ff;--ac2:#3fb950;--wn:#f0883e;--rd:#f85149;--pd:#d2a8ff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
.c{max-width:760px;margin:0 auto;padding:1.5rem 1rem 3rem}

/* Back link */
.back{display:inline-flex;align-items:center;gap:.35rem;font-family:'Space Mono',monospace;font-size:.75rem;color:var(--tx2);text-decoration:none;padding:.35rem .6rem;border-radius:6px;border:1px solid var(--bd);background:var(--sf);transition:border-color .2s,color .2s;margin-bottom:1.5rem}
.back:hover{border-color:var(--ac);color:var(--ac)}
.back svg{width:14px;height:14px}

/* Hero */
.hero{margin-bottom:2rem}
.kicker{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--ac2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.5rem}
.hero h1{font-family:'Space Mono',monospace;font-size:clamp(1.6rem,5vw,2.4rem);font-weight:700;letter-spacing:-1px;line-height:1.15;margin-bottom:.5rem;background:linear-gradient(135deg,var(--ac2),var(--ac));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{color:var(--tx2);font-size:.9rem;margin-bottom:1.2rem}

/* Countdown */
.countdown{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem}
.cd-box{flex:1;min-width:60px;background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:.7rem .5rem;text-align:center}
.cd-num{font-family:'Space Mono',monospace;font-size:1.6rem;font-weight:700;color:var(--ac2);line-height:1}
.cd-unit{font-size:.85rem;font-weight:400;color:var(--tx2);margin:0 .35rem 0 .15rem}
.cd-lbl{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;margin-top:.2rem}

/* Section */
section{margin:2rem 0}
.s-title{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--tx2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.s-title::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ac)}
section.urgent .s-title::before{background:var(--rd)}
section.warn .s-title::before{background:var(--wn)}
section.live .s-title::before{background:var(--ac2);box-shadow:0 0 0 0 rgba(63,185,80,.5);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,185,80,.5)}70%{box-shadow:0 0 0 6px rgba(63,185,80,0)}100%{box-shadow:0 0 0 0 rgba(63,185,80,0)}}

/* Card */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:1rem 1.1rem;margin-bottom:.7rem}
.card.alert{border-color:var(--rd);background:linear-gradient(180deg,rgba(248,81,73,.05),var(--sf))}
.card.warn{border-color:var(--wn);background:linear-gradient(180deg,rgba(240,136,62,.05),var(--sf))}
.card.live{border-color:var(--ac2);background:linear-gradient(180deg,rgba(63,185,80,.06),var(--sf))}

/* Race info grid */
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem}
.info-cell{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:.7rem .8rem}
.info-lbl{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;margin-bottom:.2rem}
.info-val{font-family:'Space Mono',monospace;font-size:.95rem;font-weight:700;color:var(--tx)}
.info-val.acc{color:var(--ac)}

/* Tasks */
.task{display:flex;align-items:flex-start;gap:.7rem;padding:.7rem 0;border-bottom:1px solid var(--bd)}
.task:last-child{border-bottom:none}
.task-check{flex-shrink:0;width:18px;height:18px;border-radius:4px;border:2px solid var(--bd);margin-top:2px;background:var(--bg)}
.task.done .task-check{background:var(--ac2);border-color:var(--ac2)}
.task.done .task-check::after{content:'✓';color:var(--bg);font-weight:700;display:block;text-align:center;line-height:14px;font-size:11px}
.task-body{flex:1;min-width:0}
.task-title{font-size:.92rem;font-weight:500}
.task.done .task-title{color:var(--tx2);text-decoration:line-through}
.task-meta{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-top:.2rem;font-size:.72rem;color:var(--tx2);font-family:'Space Mono',monospace}
.prio{font-family:'Space Mono',monospace;font-size:.6rem;padding:.15rem .45rem;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.prio-urgente{background:rgba(248,81,73,.15);color:var(--rd);border:1px solid var(--rd)}
.prio-alta{background:rgba(240,136,62,.15);color:var(--wn);border:1px solid var(--wn)}
.prio-media{background:rgba(88,166,255,.1);color:var(--ac);border:1px solid var(--ac)}

/* Nav card */
.nav-card{display:flex;align-items:center;justify-content:space-between;background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:.9rem 1.1rem;text-decoration:none;color:inherit;transition:border-color .2s;margin-bottom:.7rem}
.nav-card:hover{border-color:var(--ac)}
.nav-card-title{font-family:'Space Mono',monospace;font-size:.9rem;color:var(--tx);font-weight:700}
.nav-card-sub{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--tx2);margin-top:.15rem}
.nav-card-arrow{color:var(--ac);font-family:'Space Mono',monospace;font-size:1rem}

/* Profile compact */
.profile-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.5rem}
.pf{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:.6rem .7rem}
.pf-lbl{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;margin-bottom:.15rem}
.pf-val{font-size:.85rem;color:var(--tx);font-weight:500}

/* Week (current) */
.week-head{display:flex;justify-content:space-between;align-items:flex-start;gap:.8rem;flex-wrap:wrap;margin-bottom:.6rem}
.week-num{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--tx2);text-transform:uppercase;letter-spacing:1px}
.week-label{font-family:'Space Mono',monospace;font-size:1.05rem;font-weight:700;color:var(--tx);margin-top:.15rem}
.week-dates{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--tx2);text-align:right}
.week-narr{font-size:.85rem;color:var(--tx2);line-height:1.55;padding:.7rem .85rem;background:var(--sf2);border-left:2px solid var(--ac2);border-radius:4px;margin-bottom:.9rem}
.sess{padding:.85rem 0;border-bottom:1px solid var(--bd)}
.sess:last-of-type{border-bottom:none}
.sess-head{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.35rem}
.sess-type{font-family:'Space Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.8px;font-weight:700;padding:.18rem .5rem;border-radius:4px}
.sess-type-easy{background:rgba(63,185,80,.15);color:var(--ac2);border:1px solid var(--ac2)}
.sess-type-long{background:rgba(88,166,255,.15);color:var(--ac);border:1px solid var(--ac)}
.sess-type-test{background:rgba(210,168,255,.15);color:var(--pd);border:1px solid var(--pd)}
.sess-type-hike_baseline{background:rgba(240,136,62,.15);color:var(--wn);border:1px solid var(--wn)}
.sess-type-hike{background:rgba(139,148,158,.12);color:var(--tx2);border:1px solid var(--tx2)}
.sess-type-strength{background:rgba(248,81,73,.15);color:var(--rd);border:1px solid var(--rd)}
.sess-dur{font-family:'Space Mono',monospace;font-size:.85rem;font-weight:700;color:var(--tx)}
.sess-meta{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--tx2)}
.sess-notes{font-size:.82rem;color:var(--tx2);line-height:1.5;margin-top:.3rem}

/* Route link (es. tour Komoot) */
.sess-route{display:inline-flex;align-items:center;gap:.4rem;margin-top:.55rem;padding:.45rem .7rem;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;text-decoration:none;color:var(--ac);font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;transition:border-color .2s,background .2s}
.sess-route:hover{border-color:var(--ac);background:rgba(88,166,255,.08)}
.sess-route-icon{font-size:.85rem}

/* Gear checklist */
.gear{margin-top:.6rem;padding:.7rem .85rem;background:rgba(240,136,62,.05);border:1px solid rgba(240,136,62,.25);border-radius:6px}
.gear-title{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--wn);text-transform:uppercase;letter-spacing:1px;margin-bottom:.55rem;font-weight:700}
.gear-cat{margin-bottom:.5rem}
.gear-cat:last-child{margin-bottom:0}
.gear-cat-title{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--tx);font-weight:700;margin-bottom:.2rem}
.gear-items{list-style:none;padding-left:0;margin:0}
.gear-items li{font-size:.78rem;color:var(--tx2);line-height:1.55;padding:.12rem 0 .12rem 1rem;position:relative}
.gear-items li::before{content:'·';position:absolute;left:.35rem;color:var(--wn);font-weight:700}

/* Phases timeline */
.phase{display:grid;grid-template-columns:auto 1fr;gap:.8rem;padding:.85rem 0;border-bottom:1px solid var(--bd);align-items:flex-start}
.phase:last-child{border-bottom:none}
.phase-num{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;color:var(--tx2);min-width:1.8rem;text-align:center;padding-top:.1rem}
.phase.current .phase-num{color:var(--ac2)}
.phase.past .phase-num{color:var(--bd)}
.phase-name{font-family:'Space Mono',monospace;font-size:.9rem;font-weight:700;color:var(--tx)}
.phase.current .phase-name{color:var(--ac2)}
.phase-dates{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--tx2);margin-top:.15rem;margin-bottom:.4rem}
.phase-focus{font-size:.82rem;color:var(--tx2);line-height:1.5;margin-bottom:.4rem}
.phase-kpi{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--ac);background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.2);border-radius:4px;padding:.4rem .55rem;line-height:1.5}

/* Milestones */
.ms{display:flex;align-items:flex-start;gap:.7rem;padding:.6rem 0;border-bottom:1px solid var(--bd)}
.ms:last-child{border-bottom:none}
.ms.past{opacity:.5}
.ms-date{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--tx);min-width:5.2rem;font-weight:700}
.ms-date small{display:block;font-size:.6rem;color:var(--tx2);font-weight:400;margin-top:.1rem;text-transform:uppercase;letter-spacing:.5px}
.ms-body{flex:1;min-width:0}
.ms-label{font-size:.85rem;color:var(--tx)}
.ms-type{display:inline-block;font-family:'Space Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.8px;padding:.12rem .4rem;border-radius:3px;margin-top:.2rem;font-weight:700}
.ms-type-test{background:rgba(210,168,255,.12);color:var(--pd)}
.ms-type-burocrazia{background:rgba(240,136,62,.12);color:var(--wn)}
.ms-type-milestone{background:rgba(63,185,80,.12);color:var(--ac2)}
.ms-type-race{background:rgba(248,81,73,.15);color:var(--rd);font-weight:700}

/* Zones table */
.zone-row{display:grid;grid-template-columns:auto auto 1fr;gap:.7rem;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--bd);font-size:.78rem}
.zone-row:last-child{border-bottom:none}
.zone-id{font-family:'Space Mono',monospace;font-weight:700;font-size:.85rem;min-width:1.5rem}
.zone-bpm{font-family:'Space Mono',monospace;color:var(--tx2);min-width:5.5rem}
.zone-lbl{color:var(--tx)}
.zone-use{display:block;font-size:.7rem;color:var(--tx2);margin-top:.15rem}

/* Strength exercises */
.ex{padding:.55rem 0;border-bottom:1px solid var(--bd)}
.ex:last-child{border-bottom:none}
.ex-name{font-size:.85rem;color:var(--tx);font-weight:500}
.ex-meta{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--ac);margin-top:.15rem}
.ex-focus{font-size:.75rem;color:var(--tx2);margin-top:.15rem;line-height:1.45}

/* Rules */
.rule{padding:.55rem 0;border-bottom:1px solid var(--bd);font-size:.85rem;color:var(--tx);line-height:1.5}
.rule:last-child{border-bottom:none}
.rule::before{content:'→ ';color:var(--ac);font-family:'Space Mono',monospace;font-weight:700}

/* Details/accordion */
details{background:var(--sf);border:1px solid var(--bd);border-radius:10px;margin-bottom:.7rem}
details[open]{border-color:var(--ac)}
summary{padding:.85rem 1.1rem;cursor:pointer;font-family:'Space Mono',monospace;font-size:.8rem;font-weight:700;color:var(--tx);display:flex;justify-content:space-between;align-items:center;list-style:none;-webkit-tap-highlight-color:transparent}
summary::-webkit-details-marker{display:none}
summary::after{content:'+';color:var(--ac);font-size:1.2rem;font-weight:400;transition:transform .2s}
details[open] summary::after{transform:rotate(45deg)}
details > div{padding:0 1.1rem 1rem}
.summary-sub{display:block;font-family:'DM Sans',sans-serif;font-weight:400;font-size:.72rem;color:var(--tx2);margin-top:.15rem;text-transform:none;letter-spacing:0}

/* Loading & error */
.loader{text-align:center;padding:3rem 0;color:var(--tx2)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite;margin-bottom:.6rem}
@keyframes spin{to{transform:rotate(360deg)}}
.error{padding:1.5rem;color:var(--rd);font-size:.85rem;background:rgba(248,81,73,.05);border:1px solid var(--rd);border-radius:10px;text-align:center}

footer{margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--bd);text-align:center;color:var(--tx2);font-size:.72rem}
footer a{color:var(--ac);text-decoration:none}

@media(max-width:480px){
  .info-grid{grid-template-columns:1fr 1fr}
  .cd-num{font-size:1.4rem}
  .week-dates{text-align:left;width:100%}
}
</style>
</head>
<body>
<div class="c">
  <a class="back" href="../"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>Progetti</a>

  <div id="app"><div class="loader"><div class="spinner"></div><br>Caricamento dati...</div></div>

  <footer>
    <a href="https://github.com/fabiosangregorio/claude-projects/tree/main/trail-brenta-2026" target="_blank" rel="noopener">trail-brenta-2026</a>
    · <span id="lastUpdated">—</span>
  </footer>
</div>

<script>
const BASE = './data/';

async function loadAll() {
  const app = document.getElementById('app');
  try {
    const [profile, params, runsManifest] = await Promise.all([
      fetch(BASE + 'profile.json').then(r => { if (!r.ok) throw new Error('profile.json: ' + r.status); return r.json(); }),
      fetch(BASE + 'parameters.json').then(r => { if (!r.ok) throw new Error('parameters.json: ' + r.status); return r.json(); }),
      fetch(BASE + 'runs/index.json').then(r => r.ok ? r.json() : { runs: [] }).catch(() => ({ runs: [] }))
    ]);
    render(app, profile, params, runsManifest);
    document.getElementById('lastUpdated').textContent = 'parametri aggiornati ' + params.last_updated;
  } catch (err) {
    app.innerHTML = `<div class="error">Errore caricamento dati: ${err.message}</div>`;
  }
}

function render(app, profile, params, runsManifest) {
  app.innerHTML = [
    renderHero(profile, params),
    renderCurrentWeek(params),
    renderRunsLink(runsManifest),
    renderTasks(params),
    renderPhases(params),
    renderMilestones(params),
    renderRefSection(params),
    renderRaceInfo(profile),
    renderProfile(profile)
  ].join('');
}

/* ── Sections ──────────────────────────────────────────────── */

function renderHero(profile, params) {
  const r = profile.race_target;
  const cd = countdown(r.date);
  return `
    <div class="hero">
      <div class="kicker">Piano di allenamento</div>
      <h1>${r.event}</h1>
      <p class="hero-sub">${formatItalianDate(r.date)} · ${r.location} · ${r.distance_km} km · ${r.elevation_gain_m} m D+ · obiettivo: <strong>${r.goal}</strong></p>
      <div class="countdown">
        <div class="cd-box"><div class="cd-num">${cd.weeks}<span class="cd-unit">sett</span> ${cd.daysRem}<span class="cd-unit">gg</span></div><div class="cd-lbl">al via</div></div>
      </div>
    </div>
  `;
}

function renderCurrentWeek(params) {
  if (!params.plan || !params.plan.weeks || !params.plan.weeks.length) return '';

  const today = todayISO();
  const weeks = params.plan.weeks;
  let week = weeks.find(w => today >= w.start_date && today <= w.end_date);
  let label = 'Settimana corrente';

  if (!week) {
    const next = weeks.find(w => w.start_date > today);
    if (next) { week = next; label = 'Prossima settimana'; }
    else { week = weeks[weeks.length - 1]; label = 'Ultima settimana definita'; }
  }

  const phase = params.plan.phases.find(p => p.id === week.phase_id);
  const sessHtml = (week.sessions || []).map(renderSession).join('');
  const strengthHtml = week.strength
    ? `<div class="sess">
         <div class="sess-head">
           <span class="sess-type sess-type-strength">forza</span>
           <span class="sess-dur">~25 min</span>
           <span class="sess-meta">full-body · vedi sotto</span>
         </div>
         <div class="sess-notes">Template completo nella sezione "Forza & mobility" più sotto. 1 sessione. Mai prima del lungo.</div>
       </div>`
    : (week.strength_note ? `<div class="sess"><div class="sess-notes" style="color:var(--wn)">⚠ ${week.strength_note}</div></div>` : '');

  return `
    <section class="live">
      <h2 class="s-title">${label}</h2>
      <div class="card live">
        <div class="week-head">
          <div>
            <div class="week-num">${phase ? phase.name : ''} · settimana ${week.number}/${params.plan.total_weeks}</div>
            <div class="week-label">${week.label || ''}</div>
          </div>
          <div class="week-dates">${formatItalianDate(week.start_date, true)}<br>↓<br>${formatItalianDate(week.end_date, true)}</div>
        </div>
        ${week.narrative ? `<div class="week-narr">${week.narrative}</div>` : ''}
        ${sessHtml}
        ${strengthHtml}
        ${week.milestone ? `<div style="margin-top:.8rem;padding:.55rem .7rem;background:rgba(210,168,255,.08);border:1px solid var(--pd);border-radius:6px;font-size:.78rem;color:var(--pd);font-family:'Space Mono',monospace">★ ${week.milestone}</div>` : ''}
      </div>
    </section>
  `;
}

function renderSession(s) {
  const types = { easy:'facile', long:'lungo', test:'test', hike_baseline:'baseline trail', hike:'hike', strength:'forza' };
  const typeLabel = types[s.type] || s.type;
  const meta = [];
  if (s.intensity) meta.push(s.intensity);
  if (s.fc_max_bpm) meta.push(`FC max ${s.fc_max_bpm}`);
  if (s.vertical_m) meta.push(`+${s.vertical_m} m`);
  else if (s.vertical_m_max) meta.push(`+${s.vertical_m_max} m max`);

  const gearHtml = (s.gear_checklist && s.gear_checklist.length) ? `
    <div class="gear">
      <div class="gear-title">Cosa portare</div>
      ${s.gear_checklist.map(g => `
        <div class="gear-cat">
          <div class="gear-cat-title">${g.category}</div>
          <ul class="gear-items">${g.items.map(i => `<li>${i}</li>`).join('')}</ul>
        </div>
      `).join('')}
    </div>` : '';

  const routeHtml = s.route_url ? `
    <a class="sess-route" href="${s.route_url}" target="_blank" rel="noopener">
      <span class="sess-route-icon">↗</span>
      <span class="sess-route-text">${s.route_name || 'Apri percorso'}</span>
    </a>` : '';

  return `
    <div class="sess">
      <div class="sess-head">
        <span class="sess-type sess-type-${s.type}">${typeLabel}</span>
        <span class="sess-dur">${s.duration_min} min</span>
        <span class="sess-meta">· ${meta.join(' · ')}</span>
      </div>
      ${s.notes ? `<div class="sess-notes">${s.notes}</div>` : ''}
      ${routeHtml}
      ${gearHtml}
    </div>
  `;
}

function renderRunsLink(manifest) {
  const n = (manifest && manifest.runs) ? manifest.runs.length : 0;
  const sub = n === 0 ? 'nessuna uscita registrata' : (n === 1 ? '1 uscita registrata' : `${n} uscite registrate`);
  return `
    <a class="nav-card" href="./runs.html">
      <div>
        <div class="nav-card-title">Allenamenti</div>
        <div class="nav-card-sub">${sub}</div>
      </div>
      <div class="nav-card-arrow">→</div>
    </a>
  `;
}

function renderTasks(params) {
  const urgent = params.preparation_tasks.filter(t => t.priority === 'urgente' && t.status !== 'done');
  const open = params.preparation_tasks.filter(t => t.status !== 'done');
  const done = params.preparation_tasks.filter(t => t.status === 'done');
  const isUrgent = urgent.length > 0;

  const taskHtml = open.concat(done).map(t => `
    <div class="task ${t.status === 'done' ? 'done' : ''}">
      <div class="task-check"></div>
      <div class="task-body">
        <div class="task-title">${t.task}</div>
        <div class="task-meta">
          ${t.priority ? `<span class="prio prio-${t.priority}">${t.priority}</span>` : ''}
          <span>${t.category}</span>
          ${t.deadline ? `<span>· entro ${formatItalianDate(t.deadline, true)}</span>` : ''}
        </div>
        ${t.note ? `<div class="task-meta" style="margin-top:.3rem">${t.note}</div>` : ''}
      </div>
    </div>
  `).join('');

  return `
    <section class="${isUrgent ? 'urgent' : ''}">
      <h2 class="s-title">Stato preparazione ${isUrgent ? '— azioni urgenti' : ''}</h2>
      <div class="card ${isUrgent ? 'alert' : ''}">
        ${taskHtml}
      </div>
    </section>
  `;
}

function renderPhases(params) {
  if (!params.plan || !params.plan.phases) return '';
  const today = todayISO();

  const html = params.plan.phases.map(p => {
    let cls = '';
    if (today > p.end_date) cls = 'past';
    else if (today >= p.start_date && today <= p.end_date) cls = 'current';

    return `
      <div class="phase ${cls}">
        <div class="phase-num">${p.number}</div>
        <div>
          <div class="phase-name">${p.name}</div>
          <div class="phase-dates">${formatItalianDate(p.start_date, true)} → ${formatItalianDate(p.end_date, true)} · sett ${p.weeks_range[0]}-${p.weeks_range[1]} · lungo ${p.long_run_min[0]}-${p.long_run_min[1]} min · D+ ${p.vertical_target_m[0]}-${p.vertical_target_m[1]} m</div>
          <div class="phase-focus">${p.focus}</div>
          <div class="phase-kpi">★ ${p.key_objective}</div>
        </div>
      </div>
    `;
  }).join('');

  return `
    <section>
      <h2 class="s-title">Le 4 fasi</h2>
      <div class="card">${html}</div>
    </section>
  `;
}

function renderMilestones(params) {
  if (!params.plan || !params.plan.milestones) return '';
  const today = todayISO();
  const sorted = [...params.plan.milestones].sort((a,b) => a.date.localeCompare(b.date));

  const html = sorted.map(m => {
    const past = m.date < today;
    const days = Math.ceil((new Date(m.date) - new Date(today)) / 86400000);
    const dayLbl = past ? '' : (days === 0 ? 'oggi' : days === 1 ? 'domani' : `tra ${days} gg`);

    return `
      <div class="ms ${past ? 'past' : ''}">
        <div class="ms-date">${formatItalianDate(m.date, true)}<small>${dayLbl}</small></div>
        <div class="ms-body">
          <div class="ms-label">${m.label}</div>
          <span class="ms-type ms-type-${m.type}">${m.type}</span>
        </div>
      </div>
    `;
  }).join('');

  return `
    <section>
      <h2 class="s-title">Milestone</h2>
      <div class="card">${html}</div>
    </section>
  `;
}

function renderRefSection(params) {
  const z = params.training_zones;
  const s = params.plan.strength_template;
  const m = params.plan.mobility_template;
  const rules = params.plan.rules || [];
  const budget = params.plan.weekly_budget;

  const zonesHtml = (z && z.zones) ? z.zones.map(zone => `
    <div class="zone-row">
      <div class="zone-id" style="color:${zone.color}">${zone.id.toUpperCase()}</div>
      <div class="zone-bpm">${zone.min_bpm}–${zone.max_bpm} bpm</div>
      <div><span class="zone-lbl">${zone.label}</span><span class="zone-use">${zone.use}</span></div>
    </div>
  `).join('') : '';

  const exHtml = (s && s.exercises) ? s.exercises.map(e => `
    <div class="ex">
      <div class="ex-name">${e.name}</div>
      <div class="ex-meta">${e.sets} × ${e.reps}</div>
      <div class="ex-focus">${e.focus}</div>
    </div>
  `).join('') : '';

  const mobHtml = (m && m.exercises) ? m.exercises.map(e => `
    <div class="ex">
      <div class="ex-name">${e.name}</div>
      <div class="ex-meta">${e.duration}</div>
    </div>
  `).join('') : '';

  const rulesHtml = rules.map(r => `<div class="rule">${r}</div>`).join('');

  return `
    <section>
      <h2 class="s-title">Riferimenti tecnici</h2>

      <details>
        <summary>
          <span>Budget settimanale & regole<span class="summary-sub">${budget.running_sessions} corse + ${budget.strength_sessions} forza · ${rules.length} regole d'ingaggio</span></span>
        </summary>
        <div>
          <div style="font-size:.82rem;color:var(--tx2);line-height:1.55;margin-bottom:.9rem;padding:.7rem;background:var(--sf2);border-radius:6px">${budget.philosophy}</div>
          ${rulesHtml}
        </div>
      </details>

      <details>
        <summary>
          <span>Zone di frequenza cardiaca<span class="summary-sub">FCmax ${z.fcmax_bpm} · MAF ${z.maf_ceiling_bpm} · 5 zone</span></span>
        </summary>
        <div>
          <div style="font-size:.75rem;color:var(--tx2);margin-bottom:.7rem;line-height:1.5"><em>${z.fcmax_source}</em></div>
          ${zonesHtml}
          <div style="margin-top:.8rem;font-size:.78rem;color:var(--ac2);font-family:'Space Mono',monospace">★ MAF ${z.maf_ceiling_bpm} bpm: ${z.maf_note}</div>
        </div>
      </details>

      <details>
        <summary>
          <span>Forza<span class="summary-sub">${s.frequency} · ${s.duration_min} min · ${s.exercises.length} esercizi</span></span>
        </summary>
        <div>
          <div style="font-size:.78rem;color:var(--tx2);margin-bottom:.5rem"><strong>Quando:</strong> ${s.best_timing}</div>
          <div style="font-size:.78rem;color:var(--tx2);margin-bottom:.5rem"><strong>Riscaldamento:</strong> ${s.warmup}</div>
          <div style="font-size:.78rem;color:var(--tx2);margin-bottom:.9rem"><strong>Kit:</strong> ${s.kit}</div>
          ${exHtml}
          <div style="margin-top:.8rem;font-size:.78rem;color:var(--ac2);font-family:'Space Mono',monospace">★ Progressione: ${s.progression}</div>
        </div>
      </details>

      <details>
        <summary>
          <span>Mobility post-corsa<span class="summary-sub">${m.exercises.length} esercizi · ~5 min</span></span>
        </summary>
        <div>
          <div style="font-size:.78rem;color:var(--tx2);margin-bottom:.7rem">${m.when}</div>
          ${mobHtml}
        </div>
      </details>
    </section>
  `;
}

function renderRaceInfo(profile) {
  const r = profile.race_target;
  return `
    <section>
      <h2 class="s-title">Obiettivo gara</h2>
      <div class="info-grid">
        <div class="info-cell"><div class="info-lbl">Data</div><div class="info-val acc">${formatItalianDate(r.date)}</div></div>
        <div class="info-cell"><div class="info-lbl">Partenza</div><div class="info-val">${r.start_time}</div></div>
        <div class="info-cell"><div class="info-lbl">Distanza</div><div class="info-val">${r.distance_km} km</div></div>
        <div class="info-cell"><div class="info-lbl">Dislivello</div><div class="info-val">+${r.elevation_gain_m} m</div></div>
        <div class="info-cell"><div class="info-lbl">Tempo max</div><div class="info-val">${r.max_time_hours}h</div></div>
        <div class="info-cell"><div class="info-lbl">Cancello</div><div class="info-val" style="font-size:.78rem">${r.cancello_orario.checkpoint}<br><span style="color:var(--rd)">${r.cancello_orario.limit}</span></div></div>
      </div>
      <div class="card" style="margin-top:.7rem">
        <div class="info-lbl" style="margin-bottom:.4rem">Percorso</div>
        <div style="font-size:.82rem;color:var(--tx2);line-height:1.55">${r.route_summary}</div>
        <div style="margin-top:.7rem"><a href="${r.official_url}" target="_blank" rel="noopener" style="font-family:'Space Mono',monospace;font-size:.75rem;color:var(--ac);text-decoration:none">→ sito ufficiale</a></div>
      </div>
    </section>
  `;
}

function renderProfile(profile) {
  const a = profile.athlete;
  const e = profile.experience;
  return `
    <section>
      <h2 class="s-title">Profilo atleta</h2>
      <div class="profile-grid">
        <div class="pf"><div class="pf-lbl">Età</div><div class="pf-val">${a.age} anni</div></div>
        <div class="pf"><div class="pf-lbl">Peso × Altezza</div><div class="pf-val">${a.weight_kg} kg × ${a.height_cm} cm</div></div>
        <div class="pf"><div class="pf-lbl">BMI</div><div class="pf-val">${a.bmi}</div></div>
        <div class="pf"><div class="pf-lbl">Località</div><div class="pf-val">${a.location.city} (${a.location.province})</div></div>
        <div class="pf"><div class="pf-lbl">Corsa</div><div class="pf-val">${e.running.level} · ${e.running.current_freq_per_week}/sett</div></div>
        <div class="pf"><div class="pf-lbl">Hiking</div><div class="pf-val">${e.mountain.hiking} · max ${e.mountain.max_elevation_recent_m} m</div></div>
        <div class="pf"><div class="pf-lbl">Gare passate</div><div class="pf-val">${e.running.race_history}</div></div>
        <div class="pf"><div class="pf-lbl">Trail running</div><div class="pf-val">${e.mountain.trail_running}</div></div>
      </div>
    </section>
  `;
}

/* ── Helpers ───────────────────────────────────────────────── */

function todayISO() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function countdown(targetISO) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(targetISO);
  const totalDays = Math.max(0, Math.ceil((target - today) / 86400000));
  const weeks = Math.floor(totalDays / 7);
  const daysRem = totalDays % 7;
  return { weeks, daysRem, totalDays };
}

function formatItalianDate(iso, short = false) {
  const months = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  const monthsLong = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
  const d = new Date(iso);
  return `${d.getDate()} ${(short ? months : monthsLong)[d.getMonth()]} ${d.getFullYear()}`;
}
